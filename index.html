<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>XR Disclosure HUD v3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #020611;
      font-family: Arial, Helvetica, sans-serif;
    }
    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #dff8ff;
      background: rgba(6, 14, 29, 0.78);
      border: 1px solid rgba(126, 247, 255, 0.35);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.35;
      box-shadow: 0 0 22px rgba(0,255,255,.10);
      backdrop-filter: blur(8px);
      max-width: 330px;
    }
    .hud h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
      color: #7ef7ff;
    }
    .hud .small {
      font-size: 12.5px;
      color: #cfe7f2;
    }
    .hud b { color: #ffd76d; }
  </style>
</head>
<body>
  <div class="hud">
    <h1>XR Disclosure HUD v3</h1>
    <div class="small">
      <b>VR:</b> enter immersive mode, aim with controllers, trigger to expand panels.<br>
      <b>Desktop:</b> W A S D + mouse. Click panels to expand.
    </div>
  </div>

  <script>
    AFRAME.registerComponent('floaty', {
      schema: {speed: {default: 1}, amount: {default: 0.08}, phase: {default: 0}},
      tick: function (time) {
        const p = this.el.object3D.position;
        if (this.baseY === undefined) this.baseY = p.y;
        p.y = this.baseY + Math.sin(time * 0.001 * this.data.speed + this.data.phase) * this.data.amount;
      }
    });

    AFRAME.registerComponent('spin-axis', {
      schema: {x:{default:0}, y:{default:18}, z:{default:0}},
      tick: function (time, dt) {
        const r = this.el.object3D.rotation;
        r.x += THREE.MathUtils.degToRad(this.data.x * dt / 1000);
        r.y += THREE.MathUtils.degToRad(this.data.y * dt / 1000);
        r.z += THREE.MathUtils.degToRad(this.data.z * dt / 1000);
      }
    });

    AFRAME.registerComponent('pulse-scale', {
      schema: {min:{default:1}, max:{default:1.08}, speed:{default:1.1}, phase:{default:0}},
      tick: function(time){
        const s = this.data.min + (this.data.max - this.data.min) * (0.5 + 0.5*Math.sin(time * 0.001 * this.data.speed + this.data.phase));
        this.el.object3D.scale.set(s, s, s);
      }
    });

    AFRAME.registerComponent('interactive-panel', {
      schema: {
        title:  {type: 'string'},
        short:  {type: 'string'},
        detail: {type: 'string'},
        accent: {type: 'string', default: '#7ef7ff'},
        glow:   {type: 'string', default: '#18384a'}
      },
      init: function () {
        const d = this.data;
        const el = this.el;
        this.expanded = false;

        // Compact card
        const compact = document.createElement('a-entity');
        compact.setAttribute('class', 'clickable');

        const cBack = document.createElement('a-plane');
        cBack.setAttribute('width', 2.6);
        cBack.setAttribute('height', 0.95);
        cBack.setAttribute('color', '#081423');
        cBack.setAttribute('material', 'transparent: true; opacity: 0.88; emissive: ' + d.glow + '; emissiveIntensity: 0.42');
        compact.appendChild(cBack);

        const cFrame = document.createElement('a-plane');
        cFrame.setAttribute('width', 2.68);
        cFrame.setAttribute('height', 1.03);
        cFrame.setAttribute('color', d.accent);
        cFrame.setAttribute('material', 'wireframe: true; transparent: true; opacity: 0.62');
        cFrame.setAttribute('position', '0 0 0.02');
        compact.appendChild(cFrame);

        const cTitle = document.createElement('a-text');
        cTitle.setAttribute('value', d.title);
        cTitle.setAttribute('color', d.accent);
        cTitle.setAttribute('width', 4.0);
        cTitle.setAttribute('align', 'left');
        cTitle.setAttribute('anchor', 'left');
        cTitle.setAttribute('baseline', 'top');
        cTitle.setAttribute('position', '-1.18 0.34 0.03');
        compact.appendChild(cTitle);

        const cShort = document.createElement('a-text');
        cShort.setAttribute('value', d.short);
        cShort.setAttribute('color', '#eefbff');
        cShort.setAttribute('width', 2.95);
        cShort.setAttribute('align', 'left');
        cShort.setAttribute('anchor', 'left');
        cShort.setAttribute('baseline', 'top');
        cShort.setAttribute('position', '-1.18 0.08 0.03');
        compact.appendChild(cShort);

        const cue = document.createElement('a-text');
        cue.setAttribute('value', 'expand');
        cue.setAttribute('color', '#ffd76d');
        cue.setAttribute('width', 2.2);
        cue.setAttribute('align', 'right');
        cue.setAttribute('anchor', 'right');
        cue.setAttribute('position', '1.08 -0.32 0.03');
        compact.appendChild(cue);

        el.appendChild(compact);
        this.compact = compact;

        // Expanded card
        const expanded = document.createElement('a-entity');
        expanded.setAttribute('visible', 'false');
        expanded.setAttribute('position', '0 0 0.08');
        expanded.setAttribute('class', 'clickable');

        const eBack = document.createElement('a-plane');
        eBack.setAttribute('width', 3.9);
        eBack.setAttribute('height', 2.5);
        eBack.setAttribute('color', '#071321');
        eBack.setAttribute('material', 'transparent: true; opacity: 0.94; emissive: ' + d.glow + '; emissiveIntensity: 0.46');
        expanded.appendChild(eBack);

        const eFrame = document.createElement('a-plane');
        eFrame.setAttribute('width', 3.98);
        eFrame.setAttribute('height', 2.58);
        eFrame.setAttribute('color', d.accent);
        eFrame.setAttribute('material', 'wireframe: true; transparent: true; opacity: 0.7');
        eFrame.setAttribute('position', '0 0 0.02');
        expanded.appendChild(eFrame);

        const eTitleBar = document.createElement('a-plane');
        eTitleBar.setAttribute('width', 3.6);
        eTitleBar.setAttribute('height', 0.34);
        eTitleBar.setAttribute('color', '#0c1d32');
        eTitleBar.setAttribute('material', 'transparent: true; opacity: 0.88; emissive: ' + d.glow + '; emissiveIntensity: 0.18');
        eTitleBar.setAttribute('position', '0 1.0 0.03');
        expanded.appendChild(eTitleBar);

        const eTitle = document.createElement('a-text');
        eTitle.setAttribute('value', d.title);
        eTitle.setAttribute('color', d.accent);
        eTitle.setAttribute('width', 5.6);
        eTitle.setAttribute('align', 'left');
        eTitle.setAttribute('anchor', 'left');
        eTitle.setAttribute('baseline', 'top');
        eTitle.setAttribute('position', '-1.68 1.13 0.04');
        expanded.appendChild(eTitle);

        const eDetail = document.createElement('a-text');
        eDetail.setAttribute('value', d.detail);
        eDetail.setAttribute('color', '#eefbff');
        eDetail.setAttribute('width', 4.1);
        eDetail.setAttribute('align', 'left');
        eDetail.setAttribute('anchor', 'left');
        eDetail.setAttribute('baseline', 'top');
        eDetail.setAttribute('position', '-1.68 0.72 0.04');
        expanded.appendChild(eDetail);

        const close = document.createElement('a-text');
        close.setAttribute('value', 'collapse');
        close.setAttribute('color', '#ffd76d');
        close.setAttribute('width', 2.4);
        close.setAttribute('align', 'right');
        close.setAttribute('anchor', 'right');
        close.setAttribute('position', '1.66 -1.02 0.04');
        expanded.appendChild(close);

        el.appendChild(expanded);
        this.expandedEl = expanded;

        el.addEventListener('mouseenter', () => {
          cFrame.setAttribute('material', 'wireframe: true; transparent: true; opacity: 0.88');
        });
        el.addEventListener('mouseleave', () => {
          if (!this.expanded) {
            cFrame.setAttribute('material', 'wireframe: true; transparent: true; opacity: 0.62');
          }
        });

        el.addEventListener('click', () => this.togglePanel());
      },
      togglePanel: function () {
        this.expanded = !this.expanded;
        this.compact.setAttribute('visible', (!this.expanded).toString());
        this.expandedEl.setAttribute('visible', this.expanded.toString());
        if (this.expanded) {
          this.el.object3D.scale.set(1.06, 1.06, 1.06);
        } else {
          this.el.object3D.scale.set(1, 1, 1);
        }
      }
    });
  </script>

  <a-scene
    background="color: #020816"
    renderer="antialias: true; colorManagement: true"
    xr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: true"
    fog="type: exponential; color: #05101d; density: 0.018">

    <!-- Lighting -->
    <a-entity light="type: ambient; intensity: 0.96; color: #9fdfff"></a-entity>
    <a-entity light="type: point; intensity: 1.0; color: #66f2ff; distance: 32" position="0 5 -4"></a-entity>
    <a-entity light="type: point; intensity: 0.82; color: #cf8cff; distance: 30" position="-7 4 -9"></a-entity>
    <a-entity light="type: point; intensity: 0.82; color: #ffd76d; distance: 30" position="7 4 -9"></a-entity>

    <!-- Camera rig -->
    <a-entity id="rig" position="0 1.65 4" movement-controls="fly: false; speed: 0.18">
      <a-camera look-controls="pointerLockEnabled: false">
        <a-cursor color="#7ef7ff" raycaster="objects: .clickable" fuse="false"></a-cursor>
      </a-camera>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
    </a-entity>

    <!-- Environment -->
    <a-sky color="#030919"></a-sky>

    <a-entity id="stars">
      <a-sphere radius="0.03" color="#ffffff" position="-12 8 -16"></a-sphere>
      <a-sphere radius="0.02" color="#8beeff" position="-7 9 -20"></a-sphere>
      <a-sphere radius="0.03" color="#d09cff" position="-2 8 -14"></a-sphere>
      <a-sphere radius="0.02" color="#ffd76d" position="3 10 -16"></a-sphere>
      <a-sphere radius="0.03" color="#8beeff" position="9 7 -14"></a-sphere>
      <a-sphere radius="0.02" color="#ffffff" position="13 9 -18"></a-sphere>
      <a-sphere radius="0.02" color="#8beeff" position="-13 6 -22"></a-sphere>
      <a-sphere radius="0.02" color="#d09cff" position="12 11 -18"></a-sphere>
      <a-sphere radius="0.02" color="#ffffff" position="0 11 -24"></a-sphere>
    </a-entity>

    <!-- Floor -->
    <a-cylinder position="0 0 -8" radius="16" height="0.12" color="#07121f" material="metalness: 0.15; roughness: 0.45"></a-cylinder>
    <a-ring position="0 0.07 -8" rotation="-90 0 0" radius-inner="2.1" radius-outer="2.45" color="#73f7ff" material="transparent: true; opacity: 0.34; emissive: #73f7ff; emissiveIntensity: 0.85"></a-ring>
    <a-ring position="0 0.071 -8" rotation="-90 0 0" radius-inner="5.2" radius-outer="5.5" color="#cb8aff" material="transparent: true; opacity: 0.26; emissive: #cb8aff; emissiveIntensity: 0.75"></a-ring>
    <a-ring position="0 0.072 -8" rotation="-90 0 0" radius-inner="9.0" radius-outer="9.3" color="#ffd76d" material="transparent: true; opacity: 0.22; emissive: #ffd76d; emissiveIntensity: 0.68"></a-ring>

    <!-- Central core -->
    <a-entity position="0 2.3 -8" floaty="speed: 1.0; amount: 0.07">
      <a-sphere radius="0.78" color="#5cefff" material="transparent: true; opacity: 0.14; emissive: #5cefff; emissiveIntensity: 1.2; wireframe: true" spin-axis="y: 12"></a-sphere>
      <a-torus radius="1.25" radius-tubular="0.03" rotation="90 0 0" color="#62f6ff" material="emissive: #62f6ff; emissiveIntensity: 1.1; transparent: true; opacity: 0.85" spin-axis="y: 26"></a-torus>
      <a-torus radius="1.65" radius-tubular="0.026" rotation="40 0 25" color="#cd88ff" material="emissive: #cd88ff; emissiveIntensity: 1.05; transparent: true; opacity: 0.78" spin-axis="x: 18; y: 13"></a-torus>
      <a-torus radius="2.0" radius-tubular="0.02" rotation="0 0 90" color="#ffd76d" material="emissive: #ffd76d; emissiveIntensity: 0.95; transparent: true; opacity: 0.74" spin-axis="z: 24"></a-torus>
      <a-torus radius="2.35" radius-tubular="0.017" rotation="75 0 0" color="#7ff8ff" material="emissive: #7ff8ff; emissiveIntensity: 0.88; transparent: true; opacity: 0.62" spin-axis="y: 34"></a-torus>

      <a-entity position="0 1.85 0">
        <a-plane width="3.8" height="0.58" color="#081321" material="transparent: true; opacity: 0.54; emissive: #14364b; emissiveIntensity: 0.38"></a-plane>
        <a-text value="DISCLOSURE XR HUD" align="center" color="#7ef7ff" width="6.6" position="0 0.02 0.03"></a-text>
      </a-entity>
    </a-entity>

    <!-- Panels -->
    <a-entity position="-8.8 2.6 -12" rotation="0 24 0" floaty="speed: 0.9; amount: 0.05; phase: 0.0"
      interactive-panel="title: KNOWLEDGE SHIFT; short: Information reduces shock.; detail: The 2024 report found a strong split. People who knew more about UAP and NHI saw disclosure as more positive and transformational. People who knew less were dominated by fear, uncertainty, and paralysis.\n\nImplication: familiarity changes reaction.; accent: #7ef7ff; glow: #1b4b63"></a-entity>

    <a-entity position="-4.4 3.1 -14.1" rotation="0 12 0" floaty="speed: 1.0; amount: 0.05; phase: 0.7"
      interactive-panel="title: MEDIA REHEARSAL; short: Documentary plus blockbuster.; detail: The Age of Disclosure moves secrecy, UAP, and NHI themes into the mainstream. Disclosure Day may push them further into mass culture.\n\nImplication: the public is being culturally primed before any formal disclosure.; accent: #d495ff; glow: #43245c"></a-entity>

    <a-entity position="0 3.25 -14.9" rotation="0 0 0" floaty="speed: 0.95; amount: 0.05; phase: 1.5"
      interactive-panel="title: GLOBAL AWARENESS; short: A planetary frame.; detail: One of the strongest positive themes was a shift toward We Are Not Alone consciousness. That can redirect attention toward ecological stewardship, civilizational humility, and humanity's place in a wider cosmos.\n\nImplication: disclosure can become a planetary identity event.; accent: #9bf7b5; glow: #23412a"></a-entity>

    <a-entity position="4.4 3.1 -14.1" rotation="0 -12 0" floaty="speed: 1.06; amount: 0.05; phase: 2.2"
      interactive-panel="title: STEM STIMULUS; short: Curiosity into research.; detail: The report's strongest likely positive for the full sample was increased investment in STEM. Public interest can spill into aerospace, propulsion, materials science, sensors, AI, astronomy, and consciousness research.\n\nImplication: curiosity may convert into education and research.; accent: #ffd76d; glow: #5b4218"></a-entity>

    <a-entity position="8.8 2.6 -12" rotation="0 -24 0" floaty="speed: 0.88; amount: 0.05; phase: 2.8"
      interactive-panel="title: NEGATIVE RISKS; short: Hoaxes, distrust, polarization.; detail: The same media wave that prepares the public can destabilize the information field. The report warned about hoaxes, institutional distrust, polarization, social fracture, and disengagement.\n\nImplication: preparation and contamination rise together.; accent: #ff96ad; glow: #5a2432"></a-entity>

    <a-entity position="-9.8 1.4 -7.2" rotation="0 38 0" floaty="speed: 0.84; amount: 0.04; phase: 0.9"
      interactive-panel="title: EVIDENCE TRAP; short: Attention without proof.; detail: Mainstream attention without decisive public evidence can create a credibility trap. Believers intensify certainty. Skeptics intensify dismissal. Institutions look evasive whether they speak or remain silent.\n\nImplication: evidence standards become crucial.; accent: #8cefff; glow: #16384a"></a-entity>

    <a-entity position="0 0.95 -4.9" rotation="0 0 0" floaty="speed: 1.0; amount: 0.04; phase: 1.8"
      interactive-panel="title: PREPARATION; short: Stay grounded and evidence-literate.; detail: Best response: build evidence hygiene, normalize uncertainty, stay grounded psychologically, keep dialogue open, resist scams and manipulation, and preserve a constructive frame rooted in humility, science, ecology, and compassion.\n\nImplication: disciplined openness is the healthiest stance.; accent: #ffd76d; glow: #5b4218"></a-entity>

    <a-entity position="9.8 1.4 -7.2" rotation="0 -38 0" floaty="speed: 0.94; amount: 0.04; phase: 2.5"
      interactive-panel="title: BOTTOM LINE; short: More relevant, not less.; detail: The current media wave does not equal formal disclosure. But it makes the 2024 study more relevant. The central test is whether a mass public can move from fear and uncertainty toward transformational possibility without losing evidentiary discipline.\n\nImplication: knowledge raises both opportunity and stakes.; accent: #9ef7ff; glow: #17384a"></a-entity>

    <!-- Beacons -->
    <a-entity position="-12.4 1.0 -9.1" pulse-scale="min:1; max:1.1; speed:1.0; phase:0.2">
      <a-cylinder radius="0.09" height="2.5" color="#57f6ff" material="emissive: #57f6ff; emissiveIntensity: 1.08; transparent: true; opacity: 0.9"></a-cylinder>
      <a-sphere radius="0.20" position="0 1.32 0" color="#57f6ff" material="emissive: #57f6ff; emissiveIntensity: 1.2"></a-sphere>
    </a-entity>

    <a-entity position="12.4 1.0 -9.1" pulse-scale="min:1; max:1.1; speed:1.0; phase:1.8">
      <a-cylinder radius="0.09" height="2.5" color="#cc88ff" material="emissive: #cc88ff; emissiveIntensity: 1.08; transparent: true; opacity: 0.9"></a-cylinder>
      <a-sphere radius="0.20" position="0 1.32 0" color="#cc88ff" material="emissive: #cc88ff; emissiveIntensity: 1.2"></a-sphere>
    </a-entity>
  </a-scene>
</body>
</html>
