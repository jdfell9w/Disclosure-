<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>UAP Disclosure Implications XR HUD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #02040a; }
    .overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9;
      font-family: Arial, Helvetica, sans-serif;
      color: #dff7ff;
      background: rgba(5,12,24,.75);
      border: 1px solid rgba(120,220,255,.35);
      border-radius: 14px;
      padding: 12px 14px;
      max-width: 360px;
      line-height: 1.35;
      box-shadow: 0 0 24px rgba(0,255,255,.14);
      backdrop-filter: blur(8px);
    }
    .overlay h1 {
      margin: 0 0 6px 0;
      font-size: 18px;
      color: #7ef7ff;
    }
    .overlay .small {
      font-size: 12.5px;
      color: #c7e8f3;
    }
    .overlay b { color: #ffd86b; }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>XR Disclosure HUD</h1>
    <div class="small">
      Tap the VR goggles icon for Quest/WebXR immersive mode.<br>
      Desktop: <b>W A S D</b> move, mouse drag to look around.<br>
      In VR: use controller rays to point at the scene.<br>
      This environment visualizes the key implications from the updated disclosure analysis.
    </div>
  </div>

  <script>
    AFRAME.registerComponent('floaty', {
      schema: {speed: {default: 1}, amount: {default: 0.12}, phase: {default: 0}},
      tick: function (time) {
        const p = this.el.object3D.position;
        if (this.baseY === undefined) this.baseY = p.y;
        p.y = this.baseY + Math.sin(time * 0.001 * this.data.speed + this.data.phase) * this.data.amount;
      }
    });

    AFRAME.registerComponent('spin-axis', {
      schema: {x:{default:0}, y:{default:18}, z:{default:0}},
      tick: function (time, dt) {
        const r = this.el.object3D.rotation;
        r.x += THREE.MathUtils.degToRad(this.data.x * dt/1000);
        r.y += THREE.MathUtils.degToRad(this.data.y * dt/1000);
        r.z += THREE.MathUtils.degToRad(this.data.z * dt/1000);
      }
    });

    AFRAME.registerComponent('pulse-scale', {
      schema: {min:{default:1}, max:{default:1.08}, speed:{default:1.2}, phase:{default:0}},
      tick: function(time){
        const s = this.data.min + (this.data.max - this.data.min) * (0.5 + 0.5*Math.sin(time*0.001*this.data.speed + this.data.phase));
        this.el.object3D.scale.set(s, s, s);
      }
    });
  </script>

  <a-scene
    background="color: #020712"
    renderer="antialias: true; colorManagement: true"
    xr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: true"
    fog="type: exponential; color: #07111f; density: 0.028">

    <a-entity light="type: ambient; intensity: 0.9; color: #8fdfff"></a-entity>
    <a-entity light="type: point; intensity: 1.2; color: #69f7ff; distance: 24" position="0 4 0"></a-entity>
    <a-entity light="type: point; intensity: 0.8; color: #cc88ff; distance: 28" position="-5 3 -4"></a-entity>
    <a-entity light="type: point; intensity: 0.8; color: #ffcf7b; distance: 28" position="5 3 -4"></a-entity>

    <a-entity id="rig" position="0 1.65 6">
      <a-camera wasd-controls="acceleration: 18" look-controls="pointerLockEnabled: false">
        <a-cursor color="#7ef7ff" fuse="false"></a-cursor>
      </a-camera>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
    </a-entity>

    <a-sky color="#030816"></a-sky>
    <a-entity id="stars">
      <a-sphere radius="0.03" color="#ffffff" position="-8 6 -12"></a-sphere>
      <a-sphere radius="0.03" color="#88eaff" position="5 7 -9"></a-sphere>
      <a-sphere radius="0.03" color="#ffd670" position="2 5 -14"></a-sphere>
      <a-sphere radius="0.02" color="#d5a3ff" position="-2 8 -10"></a-sphere>
      <a-sphere radius="0.03" color="#88eaff" position="8 5 -18"></a-sphere>
      <a-sphere radius="0.02" color="#ffffff" position="-10 9 -20"></a-sphere>
      <a-sphere radius="0.02" color="#ffffff" position="10 8 -13"></a-sphere>
      <a-sphere radius="0.025" color="#d5a3ff" position="-6 4 -16"></a-sphere>
      <a-sphere radius="0.022" color="#88eaff" position="1 9 -18"></a-sphere>
      <a-sphere radius="0.02" color="#ffd670" position="-12 6 -14"></a-sphere>
      <a-sphere radius="0.02" color="#88eaff" position="12 9 -16"></a-sphere>
      <a-sphere radius="0.02" color="#ffffff" position="0 11 -20"></a-sphere>
    </a-entity>

    <a-cylinder position="0 0 -1" radius="8.2" height="0.12" color="#071221" material="metalness: 0.2; roughness: 0.45"></a-cylinder>
    <a-ring position="0 0.07 -1" rotation="-90 0 0" radius-inner="6.6" radius-outer="7.4" color="#1be7ff" material="opacity: 0.28; emissive: #1be7ff; emissiveIntensity: 0.9"></a-ring>
    <a-ring position="0 0.071 -1" rotation="-90 0 0" radius-inner="4.7" radius-outer="5.1" color="#c882ff" material="opacity: 0.24; emissive: #c882ff; emissiveIntensity: 0.8"></a-ring>
    <a-ring position="0 0.072 -1" rotation="-90 0 0" radius-inner="2.1" radius-outer="2.35" color="#ffd76d" material="opacity: 0.24; emissive: #ffd76d; emissiveIntensity: 0.8"></a-ring>

    <a-entity position="0 1.9 -1" floaty="speed: 1.3; amount: 0.08">
      <a-sphere radius="0.66" color="#4cefff" material="transparent: true; opacity: 0.14; emissive: #4cefff; emissiveIntensity: 1.2; wireframe: true" spin-axis="y: 10"></a-sphere>
      <a-torus radius="1.12" radius-tubular="0.03" rotation="90 0 0" color="#62f6ff" material="emissive: #62f6ff; emissiveIntensity: 1.1; transparent: true; opacity: 0.85" spin-axis="y: 28"></a-torus>
      <a-torus radius="1.45" radius-tubular="0.028" rotation="50 0 30" color="#cd88ff" material="emissive: #cd88ff; emissiveIntensity: 1.1; transparent: true; opacity: 0.8" spin-axis="x: 18; y: 12"></a-torus>
      <a-torus radius="1.78" radius-tubular="0.022" rotation="0 0 90" color="#ffd76d" material="emissive: #ffd76d; emissiveIntensity: 1.0; transparent: true; opacity: 0.72" spin-axis="z: 24"></a-torus>

      <a-entity position="0 1.55 0">
        <a-plane width="3.6" height="0.55" color="#081220" material="opacity: 0.44; transparent: true; emissive: #12364d; emissiveIntensity: 0.45"></a-plane>
        <a-text value="DISCLOSURE IMPLICATIONS / 2026" align="center" color="#7ef7ff" width="6.4" position="0 0 0.03"></a-text>
      </a-entity>

      <a-entity position="0 -1.45 0">
        <a-plane width="4.1" height="0.78" color="#081220" material="opacity: 0.44; transparent: true; emissive: #2c1836; emissiveIntensity: 0.45"></a-plane>
        <a-text value="A colorful XR dashboard of the 2024 study update,\nlinking The Age of Disclosure and the upcoming Disclosure Day movie." align="center" color="#ffd76d" width="6.4" position="0 0.08 0.03"></a-text>
      </a-entity>
    </a-entity>

    <a-entity position="-4.2 2.2 -3.2" rotation="0 22 0" floaty="speed: 0.9; amount: 0.08; phase: 0.4">
      <a-plane width="3.1" height="2.15" color="#081523" material="transparent: true; opacity: 0.78; emissive: #1c5f73; emissiveIntensity: 0.38"></a-plane>
      <a-plane width="3.16" height="2.21" color="#70f6ff" material="wireframe: true; transparent: true; opacity: 0.55"></a-plane>
      <a-text value="1  KNOWLEDGE CHANGES REACTION" color="#70f6ff" width="4.8" position="-1.35 0.84 0.03"></a-text>
      <a-text value="The 2024 survey found a strong split:\npeople who knew more about UAP/NHI\nsaw disclosure as far more positive and\ntransformational than those who knew less.\n\nMedia exposure may move part of the public\nfrom fear / uncertainty toward curiosity\nand preparation." color="#dff7ff" width="3.85" position="-1.36 0.48 0.03"></a-text>
      <a-text value="Signal: information can soften shock." color="#ffd76d" width="3.95" position="-1.35 -0.85 0.03"></a-text>
    </a-entity>

    <a-entity position="-1.55 2.7 -4.8" rotation="0 8 0" floaty="speed: 1.1; amount: 0.08; phase: 1.2">
      <a-plane width="3.0" height="2.25" color="#081523" material="transparent: true; opacity: 0.78; emissive: #44266d; emissiveIntensity: 0.34"></a-plane>
      <a-plane width="3.06" height="2.31" color="#cc88ff" material="wireframe: true; transparent: true; opacity: 0.55"></a-plane>
      <a-text value="2  MEDIA AS DISCLOSURE REHEARSAL" color="#cc88ff" width="4.8" position="-1.3 0.9 0.03"></a-text>
      <a-text value="The Age of Disclosure acts like a bridge\nfrom specialist UAP circles to mainstream\naudiences. Disclosure Day may push the topic\nfurther into shared culture.\n\nDocumentary + blockbuster create a rehearsal\nspace before any formal government disclosure." color="#f1e7ff" width="3.8" position="-1.28 0.50 0.03"></a-text>
      <a-text value="Signal: cultural priming is accelerating." color="#ffd76d" width="3.8" position="-1.29 -0.88 0.03"></a-text>
    </a-entity>

    <a-entity position="1.55 2.7 -4.8" rotation="0 -8 0" floaty="speed: 0.95; amount: 0.08; phase: 2.3">
      <a-plane width="3.0" height="2.25" color="#081523" material="transparent: true; opacity: 0.78; emissive: #355d2d; emissiveIntensity: 0.34"></a-plane>
      <a-plane width="3.06" height="2.31" color="#9bf7b5" material="wireframe: true; transparent: true; opacity: 0.55"></a-plane>
      <a-text value="3  POSITIVE PATHWAYS" color="#9bf7b5" width="4.7" position="-1.2 0.9 0.03"></a-text>
      <a-text value="Possible gains highlighted in the update:\n• stigma reduction\n• science and STEM curiosity\n• a planetary / ecological perspective\n• deeper public dialogue\n• improved evidence literacy\n• a more mature conversation about our\n  place in the cosmos" color="#eaffef" width="3.75" position="-1.25 0.48 0.03"></a-text>
      <a-text value="Signal: transformation remains plausible." color="#ffd76d" width="3.85" position="-1.29 -0.88 0.03"></a-text>
    </a-entity>

    <a-entity position="4.2 2.2 -3.2" rotation="0 -22 0" floaty="speed: 1.15; amount: 0.08; phase: 3.1">
      <a-plane width="3.1" height="2.15" color="#081523" material="transparent: true; opacity: 0.78; emissive: #6a2437; emissiveIntensity: 0.34"></a-plane>
      <a-plane width="3.16" height="2.21" color="#ff8aa3" material="wireframe: true; transparent: true; opacity: 0.55"></a-plane>
      <a-text value="4  RISKS / NEGATIVE DYNAMICS" color="#ff8aa3" width="4.7" position="-1.25 0.84 0.03"></a-text>
      <a-text value="The report's warning signs are even more\nrelevant in an AI media environment:\n• video hoaxes and fake leaks\n• intensified polarization\n• institutional distrust\n• apocalyptic or conspiratorial overreach\n• public disengagement after spectacle\n• blurred lines between fiction and evidence" color="#ffe7ee" width="3.75" position="-1.3 0.48 0.03"></a-text>
      <a-text value="Signal: narrative instability is rising." color="#ffd76d" width="3.9" position="-1.32 -0.85 0.03"></a-text>
    </a-entity>

    <a-entity position="-2.8 1.05 -1.35" rotation="0 32 0" floaty="speed: 1.0; amount: 0.05; phase: 0.9">
      <a-plane width="2.7" height="1.95" color="#071523" material="transparent: true; opacity: 0.8; emissive: #224d77; emissiveIntensity: 0.34"></a-plane>
      <a-plane width="2.76" height="2.01" color="#7ee7ff" material="wireframe: true; transparent: true; opacity: 0.5"></a-plane>
      <a-text value="5  WHAT TO WATCH" color="#7ee7ff" width="4.5" position="-1.1 0.73 0.03"></a-text>
      <a-text value="Look for:\n• trailer discourse becoming 'preparation'\n• new official interviews\n• spikes in AI-generated fake footage\n• a hopeful vs fear-based tone in coverage\n• widening gap between cultural disclosure\n  and formal institutional disclosure" color="#e6f9ff" width="3.45" position="-1.1 0.3 0.03"></a-text>
    </a-entity>

    <a-entity position="2.8 1.05 -1.35" rotation="0 -32 0" floaty="speed: 0.88; amount: 0.05; phase: 2.1">
      <a-plane width="2.7" height="1.95" color="#071523" material="transparent: true; opacity: 0.8; emissive: #65411d; emissiveIntensity: 0.34"></a-plane>
      <a-plane width="2.76" height="2.01" color="#ffd76d" material="wireframe: true; transparent: true; opacity: 0.5"></a-plane>
      <a-text value="6  PREPARATION AGENDA" color="#ffd76d" width="4.2" position="-1.08 0.73 0.03"></a-text>
      <a-text value="Best response:\n• build evidence hygiene\n• normalize uncertainty\n• stay grounded psychologically\n• resist scams and fear narratives\n• keep dialogue open\n• preserve the positive frame:\n  humility, science, ecology, compassion" color="#fff7de" width="3.36" position="-1.08 0.3 0.03"></a-text>
    </a-entity>

    <a-entity position="-6 1.1 -2.2" pulse-scale="min:1; max:1.1; speed:1.1; phase:0.5">
      <a-cylinder radius="0.08" height="2.5" color="#57f6ff" material="emissive: #57f6ff; emissiveIntensity: 1.1; transparent: true; opacity: 0.9"></a-cylinder>
      <a-sphere radius="0.18" position="0 1.3 0" color="#57f6ff" material="emissive: #57f6ff; emissiveIntensity: 1.2"></a-sphere>
    </a-entity>
    <a-entity position="6 1.1 -2.2" pulse-scale="min:1; max:1.1; speed:1.0; phase:2.2">
      <a-cylinder radius="0.08" height="2.5" color="#cc88ff" material="emissive: #cc88ff; emissiveIntensity: 1.1; transparent: true; opacity: 0.9"></a-cylinder>
      <a-sphere radius="0.18" position="0 1.3 0" color="#cc88ff" material="emissive: #cc88ff; emissiveIntensity: 1.2"></a-sphere>
    </a-entity>

    <a-entity position="0 0.55 0.9" rotation="-18 0 0">
      <a-plane width="5.1" height="0.44" color="#06111c" material="transparent: true; opacity: 0.7; emissive: #1a2f43; emissiveIntensity: 0.4"></a-plane>
      <a-text value="Futuristic HUD summary: transformation potential rises with knowledge, but so do the risks of hoaxes, distrust, and media confusion." align="center" width="5.8" color="#d6f8ff" position="0 0 0.03"></a-text>
    </a-entity>
  </a-scene>
</body>
</html>
